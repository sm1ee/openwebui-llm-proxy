version: "3.9"

services:
  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "0.0.0.0:6333:6333"   # REST API
      - "0.0.0.0:6334:6334"   # gRPC
    volumes:
      - ./qdrant/data:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: "${QDRANT_API_KEY}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Tool / Skill API (FastAPI + FastEmbed) ──
  tool-api:
    build:
      context: ./tool-api
      dockerfile: Dockerfile
    container_name: tool-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:8100:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: "${QDRANT_API_KEY}"
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./tool-api:/app
      - ./data:/data
      - fastembed-cache:/root/.cache/fastembed

  # ── Local File Viewer (admin-only, same-origin via nginx) ──
  local-file-viewer:
    build:
      context: ./local-file-viewer
      dockerfile: Dockerfile
    container_name: local-file-viewer
    restart: unless-stopped
    ports:
      - "127.0.0.1:8301:8000"
    environment:
      OPENWEBUI_AUTH_URL: "http://open-webui:8080/api/v1/auths/"
      OPENCLAW_WORKSPACE_DIR: "${OPENCLAW_WORKSPACE_DIR:-/absolute/path/to/your/openclaw/workspace}"
      LOCAL_FILE_URL_PREFIX: "${LOCAL_FILE_URL_PREFIX:-/absolute/path/to/your/openclaw/workspace}"
      LOCAL_FILE_MOUNT_ROOT: "/workspace-host"
      LOCAL_FILE_SIGNING_KEY_FILE: "/llm-proxy/.local-file-signing.key"
      LOCAL_FILE_REQUIRE_ADMIN: "${LOCAL_FILE_REQUIRE_ADMIN:-true}"
      LOCAL_FILE_SHOW_TITLE: "${LOCAL_FILE_SHOW_TITLE:-false}"
      LOCAL_FILE_MAX_INLINE_BYTES: "${LOCAL_FILE_MAX_INLINE_BYTES:-1048576}"
      LOCAL_FILE_AUTH_TIMEOUT_SECONDS: "${LOCAL_FILE_AUTH_TIMEOUT_SECONDS:-5}"
      LOCAL_FILE_LINK_TTL_SECONDS: "${LOCAL_FILE_LINK_TTL_SECONDS:-2592000}"
    volumes:
      - ${OPENCLAW_WORKSPACE_DIR:-/absolute/path/to/your/openclaw/workspace}:/workspace-host:ro
      - ./llm-proxy:/llm-proxy:ro
    depends_on:
      - open-webui

  # ── OpenWebUI ──
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:8080"
    environment:
      WEBUI_AUTH: "true"
      ENABLE_SIGNUP: "true"
      LOCAL_FILE_VIEWER_INTERNAL_URL: "http://local-file-viewer:8000"
      LOCAL_FILE_PROXY_TIMEOUT_SECONDS: "30"
      ENABLE_TITLE_GENERATION: "${ENABLE_TITLE_GENERATION:-true}"
      ENABLE_TAGS_GENERATION: "${ENABLE_TAGS_GENERATION:-true}"
      ENABLE_FOLLOW_UP_GENERATION: "${ENABLE_FOLLOW_UP_GENERATION:-true}"
      CHAT_AUX_TASK_MODEL: "${CHAT_AUX_TASK_MODEL:-}"
      CHAT_AUX_TASK_MODEL_EXTERNAL: "${CHAT_AUX_TASK_MODEL_EXTERNAL:-gpt-5.4-mini}"
      # Codex proxy (맥 로컬 :8200)
      OPENAI_API_BASE_URLS: "http://host.docker.internal:8200/v1;http://host.docker.internal:8201/v1"
      OPENAI_API_KEYS: "dummy-codex;dummy-claude"
      CODE_INTERPRETER_PROMPT_TEMPLATE: |-
        #### Code Interpreter

        You have access to a Python code interpreter via: `<code_interpreter></code_interpreter>`

        - When you need Python execution, put only executable Python code inside the XML tags so the tool can run it.
        - Do NOT use triple backticks inside the XML tags.
        - Always print meaningful outputs.
        - Outside the XML tags, write only normal prose.
        - Do NOT output raw Python, raw XML tags, or pseudo-code outside the XML tags.
        - If you need to show code outside the interpreter block, use fenced markdown code blocks.
        - After the interpreter output, continue with a normal chat response outside the XML tags.
    volumes:
      - open-webui-data:/app/backend/data
      - ./open-webui-runtime-patches/main.py:/app/backend/open_webui/main.py:ro
      - ./open-webui-runtime-patches/middleware.py:/app/backend/open_webui/utils/middleware.py:ro
    depends_on:
      - tool-api

volumes:
  open-webui-data:
  fastembed-cache:
