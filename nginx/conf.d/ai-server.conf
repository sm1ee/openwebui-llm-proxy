# OpenWebUI LLM Proxy — Nginx Reverse Proxy
#
# Usage:
#   1. Place SSL certificates in nginx/ssl/ (or use Let's Encrypt)
#   2. Replace YOURDOMAIN with your actual domain
#   3. nginx -t && nginx -s reload

# Korean IP geo-filtering (optional)
# include /etc/nginx/conf.d/geo-kr.conf;

upstream openwebui {
    server 127.0.0.1:3000;
}

upstream tool_api {
    server 127.0.0.1:8100;
}

upstream qdrant_api {
    server 127.0.0.1:6333;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name YOURDOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name YOURDOMAIN;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Uncomment to restrict to Korean IPs only (requires geo-kr.conf)
    # if ($is_korean = 0) {
    #     return 403;
    # }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # OpenWebUI (main frontend)
    location / {
        proxy_pass http://openwebui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Tool API
    location /api/tools/ {
        proxy_pass http://tool_api/tools/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Qdrant REST API (restrict to internal network recommended)
    location /qdrant/ {
        # allow 192.168.0.0/24;
        # deny all;
        proxy_pass http://qdrant_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
